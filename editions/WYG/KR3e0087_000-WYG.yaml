body:
  text: 瘟疫論醫家類提要臣等謹案瘟疫論二卷補遺一卷明吴有性撰有性字又可震澤人是書成扵崇禎壬午以四時不正之氣發為瘟疫其病與傷寒相似而逈殊誤作傷寒治之多死古書未能分别乃著論以發明之大抵謂傷寒自毫竅而入中扵脉絡由表入裏故其傳經有六自陽至隂以次而深瘟疫自口鼻而入伏於膜原其邪在不表不裏之間其𫝊變有九或表或裏各自為病有但表而不裏者有表而再表者有但裏而不表者有裏而再裏者有表裏分𫝊者有表裏分𫝊而再分𫝊者有表勝於裏者有先表而後裏者有先裏而後表者其問有與傷寒相反十一事又有變證兼證種種不同並著論制方一一辨别其顯然易見者則脉在不沉不伏之間中取之乃見舌必有胎初則白甚則黄太甚則黑而芒刺也其謂數百瘟疫之中乃偶有一傷寒數百傷寒之中乃偶有一隂證未免矯枉過正然古人以瘟疫為襍証醫書徃徃附見不立専門又或誤解素問冬傷於寒春必病温之文妄施治療有性因崇禎辛巳南北直𨽻山東浙江同時大疫以傷寒法治之不效乃推求病源著為此書瘟疫一證始有繩墨之可守亦可謂有功於世矣其書不甚詮次似隨筆劄録而成今姑仍其舊其下卷勞復食復條中載安神養血湯小兒時疫條中載太極丸並有方而無藥又疫痢兼證一條亦有録而無書故别為補遺於末又正名一篇傷寒例正誤一篇諸家瘟疫正誤一篇原目不載盖成書以後所續入今亦併録為一卷成完書焉乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:97fdfbe1213ca5ee0e09d006899971d47feec0dea1054a8d9719bda66dce1329
