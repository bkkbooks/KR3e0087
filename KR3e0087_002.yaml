body:
  text: 瘟疫論卷下明吳有性撰雜氣論日月星辰天之有象可睹水火土石地之有形可求昆蟲草木動植之物可見寒熱溫涼四時之氣往來可覺至於山嵐瘴氣嶺南毒霧咸得地之濁氣猶或可察而惟天地之雜氣種種不一亦猶天之有日月星辰地之有水火土石氣交之中有昆蟲草木之不一也草木有野葛巴豆星辰有羅計熒惑昆蟲有毒蛇猛獸土石有雄硫磠信萬物各有善惡不等是知雜氣之毒亦有優劣也然氣無形可求無象可見况無聲復無臭何能得睹得聞人惡得而知其氣又惡得而知其氣之不一也是氣也其來無時其著無方衆人有觸之者各隨其氣而為諸病焉其為病也或時衆人發頤或時衆人頭面浮腫俗名為大頭瘟是也或時衆人咽痛或時聲啞俗名為蝦蟆瘟是也或時衆人瘧痢或為痺氣或為痘瘡或為斑疹或為瘡疥疔瘇或時衆人目赤腫痛或時衆人嘔血暴下俗名為瓜瓤瘟探頭瘟是也或時衆人癭痎俗名為疙􅜀瘟是也為病種種難以枚舉大約病偏於一方延門合戶衆人相同者皆時行之氣即雜氣為病也為病種種是知氣之不一也蓋當時適有某氣專入某臟府某經絡專發為某病故衆人之病相同是知氣之不一非關臟府經絡或為之證也夫病不可以年嵗四時為拘蓋非五運六氣所能定者是知氣之所至無時也或發於城市或發於村落他處截然無有是知氣之所著無方也疫氣者亦雜氣中之一但有甚於他氣故為病頗重因名之厲氣雖有多寡不同然無嵗不有至於瓜瓤瘟疙􅜀瘟緩者朝發夕死急者頃刻而亡此又諸疫之最重者幸而幾百年來罕有之證不可以常疫並論也至於發頤咽痛目赤斑疹之類其時村落中偶有一二人所患者雖不與衆人等然考其症甚合某年某處衆人所患之病纎悉相同治法無異此即當年之雜氣但目今所鍾不厚所患者希少耳此又不可以衆人無有斷為非雜氣也况雜氣為病最多而舉世皆誤認為六氣假如誤認為風者如大麻風鶴膝風痛風歷節風老人中風腸風厲風癎風之類概用風藥未嘗一效實非風也皆雜氣為病耳至又誤認為火者如疔瘡發背癰疽瘇毒氣毒流注流火丹毒與夫發斑痘疹之類以為諸痛瘡瘍皆屬心火投芩連梔柏未嘗一效實非火也亦雜氣之所為耳至于誤認為暑者如霍亂吐瀉瘧痢暴注腹痛絞腸痧之類皆誤認為暑因作暑證治之未嘗一效與暑何與焉至于一切雜證無因而生者並皆雜氣所成從古未聞者何耶蓋因諸氣來而不知感而不覺惟向風寒暑濕所見之氣求之既已錯認病原未免誤投他藥大易所謂或繫之牛行人之得邑人之災也劉河間作原病式蓋祖五運六氣百病皆原於風寒暑濕燥火謂無出此六氣為病而不知雜氣為病更多於六氣良以六氣有限現在可測雜氣無窮茫然不可測也專務六氣不言雜氣焉能包括天下之病歟論氣盛衰其年疫氣盛行所患皆重最能傳染即童輩皆知其為疫至於微疫似覺無有蓋毒氣所鍾不厚也其年疫氣衰少閭里所患者不過幾人且不能傳染時師皆以傷寒為名不知者固不言疫知者亦不便言疫然則何以知其為疫蓋脉證與盛行之年所患之證纎悉相同至於用藥取效毫無差别是以知瘟疫四時皆有常年不斷但有多寡輕重耳疫氣不行之年微疫轉有衆人皆以感冒為名實不知為疫也設用發散之劑雖不合病原然亦無大害疫自愈實非藥也即不藥亦自愈至有稍重者誤投發散其害尚淺若誤用補劑及寒凉反成痼疾不可不辨論氣所傷不同所謂雜氣者雖曰天地之氣實由方土之氣也蓋其氣從地而起有是氣則有是病譬如所言天地生萬物然亦由方土之産也彼植物藉雨露而滋生動物藉飲食而頤養必先有是氣然後有是物推而廣之有無限之氣因有無限之物也但二五之精未免生尅制化是以萬物各有宜忌宜者益而忌者損損者制也故萬物各有所制如猫制鼠如鼠制象之類既知以物制物即知以氣制物矣以氣制物者蟹得霧則死棗得霧則枯之類此有形之氣動植之物皆為所制也至於無形之氣偏中於動物者如牛瘟羊瘟雞瘟鴨瘟豈但人疫而已哉然牛病而羊不病雞病而鴨不病人病而禽獸不病究其所傷不同因其氣各異也知其氣各異故謂之雜氣夫物者氣之化也氣者物之變也氣即是物物即是氣知氣可以制物則知物之可以制氣矣夫物之可以制氣者藥物也如蜒蚰解蜈蚣之毒猫肉治鼠瘻之潰此受物氣之為病是以物之氣制物之氣猶或可測至於受無形雜氣為病莫知何物之能制矣惟其不知何物之能制故勉用汗吐下三法以決之嗟乎即三法且不能盡善况乃知物乎能知以物制氣一病只有一藥之到病已不煩君臣佐使品味加减之勞矣蛔厥疫邪傳裏胃熱如沸蛔動不安下既不通必反於上蛔因嘔出此常事也但治其胃蛔厥自愈每見醫家妄引經論以為臟寒蛔上入膈其人當吐蛔又云胃中冷必吐蛔之句便用烏梅圓或理中安蛔湯方中乃細辛附子乾薑桂枝川椒皆辛熱之品投之如火上添油殊不知疫證表裏上下皆熱始終從無寒證者不思現前事理徒記紙上文辭以為依經傍注坦然用之無疑因此誤人甚衆厄逆胃氣逆則為厄逆吳中稱為冷厄以冷為名遂指為胃寒不知寒熱皆令厄逆且不以本證相參專執俗語為寒遂投丁茱薑桂誤人不少吾願執辭害義者臨證猛省治法各從其本證而消息之如見白虎證則投白虎見承氣證則投承氣膈間痰閉則宜導痰如果胃寒丁香柿蒂散宜之然不若四逆湯功效殊捷要之但治本證厄自止其他可以類推矣似表非表似裏非裏時疫初起邪氣蟠踞於中表裏阻隔裏氣滯而為悶表氣滯為頭疼身痛因見頭疼身痛往往誤認為傷寒表證因用麻黃桂枝香蘇葛根敗毒九味羌活之類此皆發散之劑強求其汗妄耗津液經氣先傷邪氣不損依然發熱也更有邪氣傳裏表氣不能通於內必壅於外每至午後潮熱熱甚則頭脹痛熱退則已此豈表實者耶以上似表誤為表證妄投升散之劑原邪愈實火氣上升頭疼轉甚須下之裏氣一通經氣降而頭疼立止若果感冒頭疼無時不痛為可辨也且有别證相參不可一途而取若汗若下後脈靜身涼渾身肢節反加痛甚一如被杖一如墜傷少動則痛苦號呼此經氣虛榮衛行澀也三四日內經氣漸回其痛漸止雖不藥必自愈設妄引經論以為風濕相搏一身盡痛不可轉側遂投疏風勝濕之劑身痛反劇似此誤人甚衆傷寒傳胃即便潮熱譫語下之無辭今時疫初起便作潮熱熱甚亦能譫語誤認為裏證妄用承氣是為誅伐無辜不知伏邪附近於胃邪未入府亦能潮熱午後熱甚亦能譫語不待胃實而後能也假令常瘧熱甚亦作譫語疸瘧不惡寒但作潮熱此豈胃實者耶以上似裏證誤投承氣裏氣先虛及邪陷胃轉見胸腹脹滿煩渴益甚病家見勢危篤以致更醫醫見下藥病甚乃指大黃為砒毒或投瀉心或投柴胡枳桔留邪在胃變證日增神脫氣盡而死向則不應下而反下之今則應下而反失下蓋因表裏不明用藥前後失序之誤論食時疫有首尾皆能食者此邪不傳胃切不可絶其飲食但不宜過食耳有愈後數日微渴微熱不思食者此微邪在胃正氣衰弱強與之即為食復有下後一日便思食食之有味當與之先與米飲一小杯加至茶甌漸進稀粥不可盡意飢則再與如忽加吞酸反覺無味乃胃氣傷也當停穀一日胃氣復復思食也仍如漸進法有愈後十數日脉靜身涼表裏俱和但不思飲食者此中氣不蘇當與粥飲迎之得穀後即思食覺飢久而不思食者一法以人參一錢煎湯與之少引胃氣忽覺思食便可勿服論飲煩渴思飲酌量與之若引飲過多自覺水停心下名停飲宜四苓散最效如大渴思飲氷水及冷飲無論四時皆可量與蓋內熱之極得冷飲相救甚宜能飲一升止與半升寧使少頃再飲至於梨汁藕汁蔗漿西瓜皆可備不時之需如不欲飲冷當易白滚湯與之乃至不思飲則知胃和矣四苓湯白茯苓二錢澤瀉一錢五分猪苓一錢五分陳皮一錢取長流水煎服古方有五苓散用桂枝者以太陽中風表證未罷併入膀胱用四苓以利小便加桂枝以解表邪為雙解散即如少陽併於胃以大柴胡合表裏而治之今人但見小便不利便用桂枝何異聾者之聽宫商胃本無病故用白术以健中今不用白术者疫邪傳胃而渴白术性壅恐以實填實也加陳皮者和中利氣也損復邪之傷人也始而傷氣繼而傷血繼而傷肉繼而傷筋繼而傷骨邪毒既退始而復氣繼而復血繼而復肉繼而復筋繼而復骨以柔脆者易損亦易復也天傾西北地陷東南故男先傷右女先傷左及其復也男先復左女先復右以素虧者易損以素實者易復也嚴正甫年三十時疫後脉證俱平飲食漸進忽然肢體浮腫别無所苦此即氣復也蓋大病後血未盛氣暴復血乃氣之依歸氣無所依故為浮腫嗣後飲食漸加浮腫漸消若誤投行氣利水藥則謬矣張德甫年二十患禁口痢晝夜無度肢體僅存皮骨痢雖减毫不進穀以人參一錢煎湯入口不一時身忽浮腫如吹氣毬之速自後飲食漸進浮腫漸消腫間已有肌肉矣若大病後三焦受傷不能通調水道下輸膀胱肢體浮腫此水氣也與氣復懸絶宜金匱腎氣丸及腎氣煎若誤用行氣利水藥必劇凡水氣足冷肢體常重氣復足不冷肢體常輕為異俞桂玉室年四十時疫後四肢脫力竟若癱瘓數日後右手始能動又三日左手方動又俞桂岡子室所患皆然標本諸竅乃人身之户牗也邪自竅而入未有不由竅而出經曰未入於府者可汗而已已入於府者可下而已麻徴君復增汗吐下三法總是導引其邪打從門户而出可為治法之大綱舍此皆治標云爾今時疫首尾一於為熱獨不言清熱者是知因邪而發熱但能治其邪不治其熱而熱自已夫邪之與熱猶形影相依形亡而影未有獨存者若以黃連解毒湯黃連瀉心湯純乎類聚寒涼專務清熱既無汗吐下之能焉能使邪從竅而出是忘其本徒治其標何異於小兒捕影行邪伏邪之别凡邪所客有行邪有伏邪故治法有難有易取效有遲有速假令行邪者如正傷寒始自太陽或傳陽明或傳少陽或自三陽入胃如行人經由某地本無根蒂因其浮游之勢病形雖重若果在經一汗而解若果傳胃一下而愈藥到便能獲效先伏而後行者所謂瘟疫之邪伏於膜原如鳥栖巢如獸藏穴榮衛所不關藥石所不及至其發也邪毒漸張內侵於府外淫於經榮衛受傷諸證漸顯然後可得而治之方其浸淫之際邪毒尚在膜原此時但可疏利使伏邪易出邪毒既離膜原乃觀其變或出表或入裏然後可導邪而出邪盡方愈初發之時毒勢漸張莫之能禦其時不惟不能即瘳其疾而病證日惟加重病家見症反增即欲更醫醫家不解亦自驚叱竟不知先時感受邪甚則病甚邪微則病微病之輕重非關於醫人之生死全賴藥石故諺有云傷寒莫治頭勞怯莫治尾若果正傷寒初受於肌表不過在經之浮邪一汗即解何莫治之有此言蓋指瘟疫而設也所以疫邪方張之際勢不可遏但使邪毒速離膜原便是治法全在後段工夫識得表裏虛實更詳輕重緩急投劑不致差謬如是可以萬舉萬全即使感受之最重者按法治之必無殞命之理若夫久病枯削酒色耗竭耆耄風燭者此等已是天真幾絶更加瘟疫自是難支又不可同日而語矣應下諸證舌白胎漸變黃胎邪在膜原舌上白胎邪在胃家舌上黃胎胎老變為沉香色也白胎未可下黃胎宜下舌黑胎邪毒在胃薰騰於上而生黑胎有黃胎老而變焦色者有津液潤澤作軟黑胎者有舌上乾燥作硬黑胎者下後二三日黑皮自脫又有一種舌上俱黑而無胎此經氣非下證也妊娠多見此隂證亦有此並非下證下後裏證去舌尚黑者胎皮未脫也不可再下務在有下證方可下舌上無胎况無下證誤下舌反見離離黑色者危急當補之舌芒刺熱傷津液此疫毒之最重者急當下老人微疫無下證舌上乾燥易生胎刺用生脉散生津潤燥芒刺自失舌裂日久失下血液枯極多有此證又熱結旁流日久不治在下則津液消亡在上則邪火毒熾亦有此證急下之裂自滿舌短舌硬舌卷皆邪氣勝真氣虧急下之邪毒去真氣回舌自舒白砂胎舌上白胎乾硬如砂皮一名水晶胎乃自白胎之時津液乾燥邪雖入胃不能變黃宜急下之若白胎澤潤者邪在膜原也邪微胎亦微邪氣盛胎如積粉滿布其舌猶未可下久而胎色不變别有下證服三消飲次早舌即變黃唇燥裂唇焦色唇口皮起口臭臭孔如烟煤胃家熱多有此證固當下唇口皮起仍用别證互較鼻孔煤黑疫毒在胃下之無辭口燥渴更有下證者宜下之下後邪去胃和渴自减若服花粉門冬知母冀其生津止渴殊謬若大汗脉長洪而渴未可下宜白虎湯汗更出身涼渴止目赤咽乾氣噴如火小便赤黑涓滴作痛小便極臭揚手躑足脉沉而數皆為內熱之極下之無辭潮熱譫語邪在胃有此證宜下然又有不可下者詳載似裏非裏條下又熱入血室條下又神虛譫語條下善太息胃家實呼吸不利胸膈痞悶每欲引氣下行故然心下滿心下髙起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛以上皆胃家邪實內結氣閉宜下之氣通則已頭脹痛胃家實氣不下降下之頭痛立止若初起頭痛别無下證未可下小便閉大便不通氣結不舒大便行小便立解誤服行氣利水藥無益大便閉轉屎氣極臭更有下證下之無辭有血液枯竭者無表裏證為虛燥宜蜜箭導及膽導大腸膠閉其人平素大便不實設遇疫邪傳裏但蒸作極臭狀如粘膠至死不結但愈蒸愈黏愈黏愈閉以致胃氣不能下行疫毒無路而出不下即死但得黏膠一去下證自除霍然而愈協熱下利熱結旁流並宜下詳見大便條下四逆脉厥體厥並屬氣閉陽氣鬱內不能四布於外胃家實也宜下之下後反見此證者為虛脫宜補發狂胃家實陽氣盛也宜下之有虛煩似狂有因欲汗作狂並詳見本條忌下應補諸證向謂傷寒無補法者蓋傷寒時疫均是客邪然傷於寒者不過風寒乃天地之正氣尚嫌其填實而不可補今感疫氣者乃天地之毒氣補之則壅裹其毒邪火愈熾是以誤補之為害尤甚於傷寒此言其常也及言其變則又有應補者或日久失下形神幾脫或久病先虧或先受大勞或老人枯竭皆當補瀉兼施設因行而增虛證者宜急峻補虛證散在諸篇此不再贅補之虛證稍退切忌再補詳見前虛後實補後虛證不退反加變證者危下後虛證不見乃臆度其虛輒用補劑法所大忌凡用補劑本日不見佳處即非應補蓋人參為益元氣之極品開胃氣之神丹下咽之後其效立見若用參之後元氣不回胃氣不轉者勿謂人參之功不捷蓋因投之不當耳急宜另作主張若恣意投之必加變證變證加而更投之者死論陰證世間罕有傷寒陰陽二證方書皆以對待言之凡論陽證即繼以隂證讀者以為陰陽二證世間均有之病所以臨診之際先將陰陽二證在於胸次往來躊躇最易牽入誤端甚有不辨脉證但窺其人多畜少艾或適在妓家或房事後得病或病適至行房醫問及此便疑為陰證殊不知病之將至雖僧尼寡婦室女童男曠夫閹宦亦皆有之與房欲何與焉即使多畜少艾頻宿娼妓房事後適病病適至行房此際偶值病邪發於膜原氣擁火鬱未免發熱到底終是陽證與陰證何與焉况又不知隂證實乃世間罕有之病而陽證似陰者何日無之究其所以然者蓋不論傷寒瘟疫傳入胃家陽氣內鬱不能外布即便四逆所謂陽厥是也又曰厥微熱亦微厥深熱亦深其厥深者甚至涼過肘膝脉沉而微劇則通身氷冷脉微欲絶雖有輕重之分總之為陽厥因其觸目皆是苟不得其要領於是誤認者良多况且瘟疫每類傷寒苟不得要領最易混淆夫瘟疫熱病也從無感寒陰自何來一也治瘟疫數百人才遇一正傷寒二也及治正傷寒數百人才遇一正陰證三也前後統論苟非歷治多人焉能一見隂證豈非世間罕有之病耶觀今傷寒科盛行之醫歷數年間或偶得遇一正陰證者有之又何必才見傷寒便疑隂證况多瘟疫又非傷寒者乎論陽證似隂凡陽厥手足皆冷或冷過肘膝甚至手足指甲皆青黑劇則遍身氷冷如石血凝青紫成片或六脉無力或脉微欲絶以上脉證悉見純陰猶以為陽證何也蓋審內證氣噴如火齦爛口臭煩渴譫語口燥舌乾舌胎黃黑或生芒刺心腹痞滿小腹疼痛小便赤澀涓滴作痛非大便燥結即大腸膠閉非協熱下利即熱結旁流以上內三焦悉見陽證所以為陽厥也粗工不察內多下證但見表證脉體純隂誤投溫劑禍不旋踵凡陽證似陰者瘟疫與正傷寒通有之其有陰證似陽者此係正傷寒家事在瘟疫無有此證故不附載詳見傷寒實録瘟疫陽證似隂者始必由膜原以漸傳裏先幾日發熱以後四肢逆冷傷寒陽證似陰者始必由陽經發熱脉浮而數邪氣自外漸次傳裏裏氣壅閉脉體方沉乃至四肢厥逆蓋非一日矣其真陰者始則惡寒而不發熱其脉沉細當即四肢逆冷急投附子回陽二三日失治即死捷要辨法凡陽證似陰外寒而內必熱故小便血赤凡陰證似陽者格陽之證也上熱下寒故小便清白但以小便赤白為據以此推之萬不失一舍病治藥嘗遇微疫醫者誤進白虎湯數劑續得四肢厥逆病勢轉劇更醫謬指為陰證投附子湯病愈此非治病實治藥也雖誤認病原藥則偶中醫者之庸病者之福也蓋病本不藥自愈之證因連進白虎寒凉慓悍抑遏胃氣以致四肢厥逆疫邪強伏故病增劇今投溫劑胃氣通行微邪流散故愈若果直中無陽陰證誤投白虎一劑立斃豈容數劑耶舍病治弊一人感疫發熱煩渴思飲氷水醫者以為凡病須忌生冷禁止甚嚴病者苦索勿與遂至兩目火迸咽喉焦燥不時烟焰上騰晝夜不寐目中見鬼無數病劇苦甚自謂但得冷飲一滴下咽雖死無恨於是乘隙匍匐竊取井水一盆置之枕傍飲一杯目頓清亮二杯鬼物潛消三杯咽喉聲出四杯筋骨舒暢飲至六杯不知盞落枕傍竟爾熟睡俄而大汗如雨衣被濕透脫然而愈蓋因其人瘦而多火素稟陽藏始則加之以熱經絡枯燥既而邪氣傳表不能作正汗而解誤投升散則病轉劇今得冷飲表裏和潤所謂除弊便是興利自然汗解宜矣更有因食因痰因寒劑因虛陷致疾不愈者皆當舍病求弊以此類推可以應變於無窮矣論輕疫誤治每成痼疾凡客邪皆有輕重之分惟疫邪感受輕者人所不識往往誤治而成痼疾假令患痢晝夜無度水穀不進人皆知其危痢也其有感之輕者晝夜雖行四五度飲食如常起居如故人亦知其輕痢未嘗誤以他病治之者慿有積滯耳至如瘟疫感之重者身熱如火頭疼身痛胸腹脹滿胎刺譫語斑黃狂躁人皆知其危疫也其有感之淺者微有頭疼身痛午後稍有潮熱飲食不甚減但食後或覺脹滿或覺惡心脉微數如是之疫最易誤認即醫家素以傷寒瘟疫為大病今因證候不顯多有不覺其為疫也且人感疫之際來而不覺既感不知最無憑據又因所感之氣甚薄發時又現證不甚雖有頭疼身痛而飲食不絶力可徒步又烏得而知其疫也病人無處追求每每妄訴病原醫家不善審察未免隨情錯認有如病前適遇小勞病人不過以此道其根由醫家不辨是非便引東垣勞倦傷脾元氣下陷乃執甘溫除大熱之句隨用補中益氣湯壅補其邪轉壅轉熱轉熱轉瘦轉瘦轉補多至危殆或有婦人患此適逢産後醫家便認為隂虛發熱血虛身痛遂投四物湯及地黃丸泥滯其邪遷延日久病邪益固邀遍女科無出滋陰養血屢投不效復更涼血通瘀不知原邪仍在積熱自是不除日漸尫羸終成廢痿凡人未免七情勞鬱醫者不知為疫乃引丹溪五火相煽之說或指為心火上炎或指為肝火冲擊遂乃類聚寒凉冀其直折而反凝住其邪徒傷胃氣疫邪不去瘀熱何清延至骨立而斃或向有宿病淹纒適逢微疫未免身痛發熱醫家病家同認為原病加重仍用前藥加减有妨於疫病益加重至死不覺者如是種種難以盡述聊舉一二從是推而廣之可以應變於無窮矣肢體浮腫時疫潮熱而渴舌黃身痛心下滿悶腹時痛脉數此應下之證也外有通身及面目浮腫喘急不已小便不利此疫兼水腫因三焦壅閉水道不行也但治其疫水腫自已宜小承氣湯向有單腹脹而後疫者治在疫若先年曾患水腫因疫而發者但治在疫腹脹水腫自愈病人通身浮腫下體益甚臍凸陰囊及隂莖腫大色白小便不利此水腫也繼又身大熱午後益甚燥渴心下滿悶喘急大便不調此又加疫也因下之下後脹不除反加腹滿宜承氣加甘遂二分弱人量减蓋先腫脹續得時疫此水腫兼疫大水在表微疫在裏也故併治之時疫愈後數日先自足浮腫小便不利腫漸至心腹而喘此水氣也宜治在水時疫愈後數日先自足浮腫小便如常雖至通身浮腫而不喘别無所苦此氣復也蓋血乃氣之依歸夫氣先血而生無所歸依故暫浮腫但靜養節飲食不藥自愈時疫身賦羸弱言不足以聽氣不足以息得下證少與承氣下證稍减更與之眩暈欲死蓋不勝其攻也絶穀期月稍補則心腹滿悶攻不可補不可守之則元氣不鼓餘邪沉匿膜原日惟水飲而已以後心腹忽加腫滿煩寃者向來沉匿之邪方悉分傳於表裏也宜承氣養榮湯一服病已設表腫未除宜微汗之自愈時疫得裏證失下以致面目浮腫及肢體微腫小便自利此表裏氣滯非兼水腫也宜承氣下之裏氣一疏表氣亦順浮腫頓除或見絶穀期月指為脾虛發腫誤補必劇妊娠更多此證治法同前皆得子母俱安但當少與慎毋過劑共七法服寒劑反熱陽氣通行溫養百骸陽氣壅閉鬱而為熱且夫人身之火無處不有無時不在但喜通達耳不論臟府經絡表裏上下血分氣分一有所阻即便發熱是知百病發熱皆由於壅鬱然火鬱而又根於氣氣嘗靈而火不靈火不能自運賴氣為之運所以氣升火亦升氣降火亦降氣行火亦行氣若阻滯則火屈曲惟是屈曲熱斯發矣是氣為火之舟楫也今疫邪透出於膜原氣為之阻時欲到胃是求伸而未能遽達也今投寒劑抑遏胃氣氣益不伸火更屈曲所以反熱也往往服芩連知柏之類病人自覺反熱其間偶有靈變者但言我非黃連證亦不知其何故也竊謂醫家每以寒凉清熱熱不能清尚信弗疑服之反熱全然不悟雖至白首終不究心悲夫知一邪之著人如飲酒然凡人醉酒脉必洪而數氣髙身熱面目俱赤乃其常也及言其變各有不同有醉後妄言妄動醒後全然不知者有雖沉醉而神思終不亂者醉後應面赤而反刮白者應委弱而反剛強者應壯熱而反惡寒戰栗者有易醉而易醒者有難醉而難醒者有發呵缺及喋噴者有頭眩眼花及頭痛者因其血氣虛實之不同藏府禀賦之各異更兼過飲小飲之别考其情狀各自不同至論醉酒一也及醒一切諸態如失凡人受邪始則晝夜發熱日晡益甚頭疼身痛舌上白胎漸加煩渴乃衆人之常也及言其變則各有不同或嘔或吐或喉咽乾燥或痰涎湧甚或純乎發熱或發熱而兼凜凜或先凜凜而後發熱或先惡寒而後發熱或先一日惡寒而後發熱以後即純乎發熱或先惡寒而後發熱以後漸漸寒少而熱多以至純熱者或晝夜發熱者或午後潮熱餘時熱稍緩者有從外解者或戰汗或狂汗自汗盜汗或發斑有潛消者有從內傳者或胸膈痞悶或心腹脹滿或心痛腹痛或胸脅痛或大便不通或前後癃閉或協熱下利或熱結旁流有黃胎黑胎者有口燥舌裂者有舌生芒刺舌色紫赤者有鼻孔如烟煤之黑者有發黃及畜血吐血衄血大小便血汗血嗽血齒衄者有發頤疙瘩瘡者有首尾能食者有絶穀一兩月者有無故最善反復者有愈後漸加飲食如舊者有愈後飲食勝常二三倍者有愈後退爪脫髮者至論惡證口禁不能張昏迷不識人足屈不能伸唇口不住牽動手足不住振戰直視上視圓睜目瞑口張聲啞舌強遺尿遺糞項强發痙手足俱痙筋惕肉膶循衣摸牀撮空理線等證種種不同因其氣血虛實之不同藏府稟賦之有異更兼感重感輕之别考其證候各自不同至論受邪一也及邪盡一切諸證如失所謂知其一萬事畢知其要者一言而終不知其要者流散無窮此之謂也以上止舉一氣因人而變至有嵗氣稍有不同者有其年衆人皆從自汗而解者更有其年衆人皆從戰汗而解者此又因氣而變餘證大同小異皆疫氣也至又雜氣為病一氣自成一病每病各又因人而變統而言之其變不可勝言矣醫者能通其變方為盡善四損不可正治凡人大勞大欲及大病久病後氣血兩虛陰陽並竭名為四損當此之際忽又加疫邪氣雖輕並為難治以正氣先虧邪氣自陷故諺有云傷寒偏死下虛人正謂此也若正氣不勝者氣不足以息言不足以聽或欲言而不能感邪雖重反無脹滿痞塞之症誤用承氣不劇即死以正氣愈損邪氣愈伏也若真血不足者面色萎黃唇口括白或因吐血崩漏或因産後亡血過多或因腸風藏毒所致感邪雖重面目又無陽色誤用承氣速死以榮血愈消邪氣益加沉匿也若真陽不足者或四肢厥逆或下利完穀肌體惡寒恆多泄瀉至夜益甚或口鼻冷氣感邪雖重反無發熱燥渴胎刺等證誤用承氣陽氣愈消隂凝不化邪氣留而不行輕則漸加委頓重則下咽立斃若真陰不足者自然五液乾枯肌膚甲錯感邪雖重應汗無汗應厥不厥誤用承氣病益加重以津液枯涸邪氣澀滯無能輸泄也凡遇此等不可以常法正治當從其損而調之調之不愈者稍以常法治之治之不及者損之至也是故一損二損輕者或可挽回重者治之無益乃至三損四損雖盧扁亦無所施矣更以老少參之少年遇損或可調治老年遇損多見治之不及良以枯魄獨存化原已絶不復滋生矣勞復食復自復疫邪已退脉證俱平但元氣未復或因梳洗沐浴或因多言妄動遂至發熱前證復起惟脉不沉實為辨此名勞復蓋氣為火之舟楫今則真氣方長勞而復折真氣既虧火亦不前如人欲濟舟楫已壞其可渡乎是火也某經氣陷則火隨陷於某經陷於經絡則為表熱陷於藏府則為裏熱虛甚熱甚虛微熱微治法輕則靜養可復重則大補氣血候真氣一回血脉融和表裏通暢所陷之火隨氣輸泄自然熱退而前證自除矣若誤用承氣及寒涼剝削之劑變證蜂起卒至殞命宜服安神養血湯若因飲食所傷者或吞酸作噯或心胸滿悶而加熱者此名食復輕則損穀自愈重則消導方痊若無故自復者以伏邪未盡此名自復當問前得某證所發亦某證少與前藥以徹其餘邪自然獲愈感冒兼疫疫邪伏而未發因感冒風寒觸動疫邪相繼而發也既有感冒之因由復有風寒之脉證先投發散一汗而解一二日續得頭疼身痛潮熱煩渴不惡寒此風寒去疫邪發也以疫法治之瘧疫兼證瘧疾二三發或七八發後忽然晝夜發熱煩渴不惡寒舌生胎刺心腹痞滿飲食不進下證漸具此瘟疫著瘧疾隱也以疫法治之瘟疫晝夜純熱心腹痞滿飲食不進下後脉靜身涼或間曰或每日時惡寒而後發熱如期者此瘟疫解瘧邪未盡也以瘧法治之瘟瘧凡瘧者寒熱如期而發餘時脉靜身涼此常瘧也以瘧法治之設傳胃者必現裏證名為瘟瘧以疫法治者生以瘧法治者死裏證者下證也下後裏證除寒熱獨存者是瘟疫减瘧證在也瘧邪未去者宜疏邪去而瘧勢在者宜截瘧勢在而挾虛者宜補疏以清脾飲截以不二飲補以四君子方見瘧門仍恐雜亂此不附載婦人時疫婦人傷寒時疫與男子無二惟經水適斷適來及崩漏産後與男子稍有不同夫經水之來乃諸經血滿歸注於血室下泄為月水血室者一名血海即衝任脉也為諸經之總任經水適來疫邪不入於胃乘勢入於血室故夜發熱譫語蓋衛氣晝行於陽不與隂爭故晝則明了夜行於隂與邪相搏故夜則發熱譫語至夜止發熱而不譫語者亦為熱入血室因有輕重之分不必拘於譫語也經曰無犯胃氣及上二焦必自愈胸膈併胃無邪勿以譫語為胃實而妄攻之但熱隨血下則自愈若有如結胸狀者血因邪結也當刺期門以通其結活人書治以柴胡湯然不若刺者之功捷經水適斷血室空虛其邪乘虛傳入邪勝正虧經氣不振不能鼓散其邪為難治且不從血泄邪氣何由即解與適來者則有血虛血實之分宜柴胡養榮湯新産血亡後過多衝任空虛與夫素善崩漏經氣久虛皆能受邪與經水適斷同法小兒時疫凡小兒感冒風寒瘧痢等證人所易知一染時疫人所難窺所以擔誤者良多何也蓋由幼科專於痘疹吐瀉驚疳併諸雜證在傷寒時疫甚略之一也古人稱幼科為啞科蓋不能盡罄所苦以告師師又安能悉乎問切之義所以但知其身熱不知其頭疼身痛也但知不思乳食心胸膨脹疑其內傷乳食安知其疫邪傳胃也但見嘔吐惡心口渴下利以小兒吐瀉為常事又安知其協熱下利也凡此何暇致思為時疫二也小兒賦質嬌怯筋骨柔脆一染時疫延捱失治即便兩目上弔不時驚搐肢體發痙十指鈎曲甚則角弓反張必延幼科正合渠平日學習見聞之證因多誤認為慢驚風遂投抱龍丸安神丸竭盡驚風之劑轉治轉劇因見不啼不語又將神門眉心亂灸艾火雖微內攻甚急兩陽相搏如火加油如罏添炭死者不可勝計深為痛憫今凡遇疫毒流行大人可染小兒豈獨不可染耶但所受之邪雖一因其氣血筋骨柔脆故所現之證為異耳務宜求邪以治故用藥與大人倣佛凡五六嵗以上者藥當减半一二三四嵗者四分之一可也又腸胃柔脆少有差誤為禍更速臨證尤宜加慎妊娠時疫孕婦時疫設應用三承氣湯須隨證施治慎毋惑於參术安胎之說病家見用承氣先自驚疑或更左右嘈雜必致醫家掣肘為子母大不祥若應下之證反用補劑邪火壅鬱熱毒愈熾胎愈不安耗氣搏血胞胎何賴是以古人有懸鐘之喻梁腐而鐘未有不落者唯用承氣逐去其邪火毒消散炎熇頓為清涼氣回而胎自固當此證候反見大黃為安胎之聖藥歷治歷當子母俱安若腹痛如錐腰痛如折此將墮欲墮之候服藥亦無及矣雖投承氣但可愈疾而全母昧者以為胎墮必反咎於醫也或詰余曰孕婦而投承氣設邪未逐先損其胎當如之何余曰結糞瘀熱腸胃間事也胎附於脊腸胃之外子宫內事也藥先到胃瘀熱才通胎氣便得舒養是以興利除害於頃刻之間何慮之有但投藥之際病衰七八餘邪自愈慎勿過劑耳凡妊娠時疫萬有四損者不可正治當從其損而調之産後同法非其損而誤補必死四損詳見前應補諸證條後主客交凡人向有他病尫羸或久瘧或內傷瘀血或吐血便血咳血男子遺精白濁精氣枯涸女人崩漏帶下血枯經閉之類以致肌肉消爍邪火獨存故脉近於數也此際稍感疫氣醫家病家見其穀食暴絶更加胸膈痞悶身疼發熱徹夜不寐指為原病加重誤以絶穀為脾虛以身痛為血虛以不寐為神虛遂投參术歸地茯神棗仁之類愈進愈危知者稍以疫法治之發熱减半不時得睡穀食稍進但數脉不去肢體時疼胸脅錐痛過期不愈醫以雜藥頻試補之則邪火愈熾瀉之則損脾壞胃滋之則膠邪愈固散之則經絡益虛疏之則精氣愈耗守之則日削近死蓋但知其伏邪已潰表裏分傳裏證雖除不知正氣衰微不能托出表邪留而不去因與血脉合而為一結為痼疾也肢體時疼者邪與榮氣搏也脉數身熱不去者邪火病鬱也脅下錐痛者火邪結於膜膈也過期不愈者凡疫邪交卸近在一七逺在二七甚至三七過此不愈者因非其治不為壞證即為痼疾也夫痼疾者所謂客邪膠固於血脉主客交渾最難得解且愈久益固治法當乘其大肉未消真元未敗急用三甲散多有得生者更附加减法隨其平素而調之三甲散鱉甲龜甲並用酥炙黃為未各一錢甘草三分川山甲土炒黃為末五分蟬退洗淨炙乾五分殭蠶白硬者切斷生用五分牡蠣煅為末五分咽燥者酌用䗪蟲三個乾者擘碎鮮者搗爛和酒少許取汁入湯藥同服其渣入諸藥同煎白芍藥酒炒七分當歸五分水二鍾煎八分濾清溫服若素有老瘧或疸瘧者加牛膝一錢何首烏一錢胃弱欲作瀉者宜用九蒸九曬若素有鬱痰者加貝母一錢老痰者加括蔞霜五分善嘔者勿用若咽乾作癢者加花粉知母各五分若素有燥嗽者加杏仁搗爛一錢五分若素有內傷瘀血者倍䗪蟲如無䗪蟲以乾漆炒烟盡為度研末五分及桃仁搗爛一錢代之服後病減六七餘勿服當盡調理法調理法凡人胃氣强盛可饑可飽若久病之後胃氣薄弱最難調理蓋胃體如竈胃氣如火穀食如薪合水穀之精微升散為血脉者如焰其糟粕下轉為糞者如燼是以竈大則薪多火盛薪斷而餘焰猶存雖薪後續而火亦然若些小鐺鍋止宜薪數莖稍多則壅滅稍斷則火絶死灰而求復燃不亦難乎若夫大病之後客邪新去胃口方開幾微之氣所當接續多與早與遲與皆不可也宜先與粥飲次糊飲次糜粥次耎飯尤當循序漸進毋先其時毋後其時當設爐火晝夜勿令斷絶以備不時之用思穀即與稍緩則胃饑如灼再緩則胃氣傷反不思食矣既不思食若照前與之雖食而弗化弗化則傷之又傷不為食復者當如初進法若更多與及黏硬之物胃氣壅甚必脹滿難支氣絶穀存乃致反覆顛倒形神俱脫而死矣統論疫有九傳治法夫疫之傳有九然亦不出乎表裏之間而已矣所謂九傳者病人各得其一非謂一病而有九傳也蓋瘟疫之來邪自口鼻而感入於膜原伏而未發不知不覺已發之後漸加發熱脉洪而數此衆人相同宜達原飲疏之繼而邪氣一離膜原察其傳變衆人多有不同者以其表裏各異耳有但表而不裏者有但裏而不表者有表而再表者有裏而再裏者有表裏分傳者有表裏分傳而再分傳者有表勝於裏者有裏勝於表者有先表而後裏者有先裏而後表者凡此九傳其病一也醫者不知九傳之法不知邪之所在如盲者之不任杖聾者之聽宫商無音可咏無路可適未免當汗不汗當下不下或顛倒誤用或尋枝摘葉但治其證不治其邪同歸於誤一也所言但表而不裏者其證頭疼身痛發熱而復凜凜內無胸滿腹脹等證穀食不絶不煩不渴此邪氣外傳由肌表而出或自斑消或從汗解斑者有斑疹桃花斑紫雲斑汗者有自汗盜汗狂汗戰汗之異此病氣之使然不必較論但求得斑得汗為愈疾耳凡自外傳者為順勿藥亦能自愈間有汗出不徹而熱不退者宜白虎湯斑出不透而熱不退者宜舉斑湯有斑汗並行而愈者若斑出不透汗出不徹而熱不除者宜白虎合舉斑湯間有表而再表者所發未盡膜原尚有隱伏之邪或二三日後四五日後依前發熱脉洪而數及其解也斑者仍斑汗者仍汗而愈未愈者仍如前法治之然亦稀有至於三表者更稀有也若但裏而不表者外無頭疼身痛向後亦無三斑四汗惟胸膈痞悶欲吐不吐雖得少吐而不快此邪傳裏之上者宜瓜蒂散吐之邪從吐減邪盡病已若邪傳裏之中下者心腹脹滿不嘔不吐或燥結便閉或熱結旁流或協熱下利或大腸膠閉並宜承氣輩導去其邪邪減病減邪盡病已上中下皆病者不可吐吐之為逆但宜承氣導之則在上之邪順流而下嘔吐立止脹滿漸除有裏而再裏者愈後二三日或四五日依前之證復發在上者仍吐之在下者仍下之再裏者常事甚至三裏者亦有也雖有上中下之分皆為裏證若表裏分傳者始則邪氣伏於膜原膜原者即半表半裏也此傳法以邪氣平分半入於裏則現裏證半出於表則現表證此疫家之常事然表裏俱病內外壅閉既不得汗而復不得下此不可汗强求其汗必不可得宜承氣先通其裏裏邪先去邪去則裏氣通中氣方能達表向者鬱於肌肉之邪乘勢盡發於肌表矣或斑或汗蓋隨其性而升泄之也諸證悉去既無表裏證而熱不退者膜原尚有已發之邪未盡也宜三消飲調之若表裏分傳而再分傳者照前表裏得病宜三消飲復下復汗如前而愈此亦常事至於三發者亦偶有之若表勝於裏者膜原伏邪發時傳表之邪多傳裏之邪少何以知之表證多而裏證少當治其表裏證兼之若裏證多而表證少者但治其裏表證自愈若先表而後裏者始則但有表證而無裏證宜達原飲有經證者當用三陽加法經證不顯但發熱者不用加法繼而脉洪大而數自汗而渴邪離膜原未能出表耳宜白虎湯辛涼解散邪從汗解脉靜身涼而愈愈後二三日後或四五日後依前發熱宜達原飲至後反加胸滿腹脹不思穀食煩渴舌生胎刺等證加大黃微利之久而不去在上者宜瓜蒂散吐之在中下者宜承氣湯導之若先裏而後表者始則發熱漸加裏證下之裏證除二三日內復發熱反加頭疼身痛脉浮者宜白虎湯若下後熱減不甚三四日後精神不慧脉浮者宜白虎湯汗之服湯復不得汗者因津液枯竭也加人參覆盆則汗解此近表裏分傳之證不在此例若大下後大汗後表裏之證悉去繼而一身盡痛身如被杖甚則不可轉側脉遲細者此汗出太過陽氣不周骨寒而痛非表證也此不必治二三日內陽氣自回身痛自愈凡疫邪再表再裏或再表裏分傳者醫家不解反責病家不善調理以致反復病家不解每責醫家用藥有誤致病復起彼此歸咎胥失之矣殊不知病勢之所當然蓋氣性如此一者不可為二二者不可為一絶非醫家病家之過也但得病者向賴精神完固雖再三反復隨復隨治隨治隨愈間有延挨失治或治之不得其法日久不除精神耗竭嗣後更醫投藥但將現在之邪拔去因而得效殊不知膜原尚有伏邪在一二日內前證復起反加循衣摸牀神思昏憒目中不了了等證且脉氣漸萎大凶之兆也譬如行人日間趲行未晚投宿何等從容今則日間繞道日暮途長急無及矣病家不咎於前醫擔誤日時反咎於後醫既生之而復殺之良可歎也當此之際攻之則元氣幾微是求速死補之則邪火愈熾精氣愈爍守之則正不勝邪必無生理三路俱亡雖有盧扁之技亦無所施矣瘟疫論卷下
