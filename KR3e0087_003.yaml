body:
  text: 瘟疫論補遺明吳有性撰安神養血湯在勞復食復自復條後茯神棗仁當歸逺志桔梗芍藥地黄陳皮甘草加圓眼肉水煎服疫痢兼證下痢膿血更加發熱而渴心腹痞滿嘔而不食此疫痢兼症最為危急夫疫者胃家事也疫邪傳胃下常八九既傳入胃必從下解葢疫邪不能自出必藉大腸之氣傳送而下疫方得愈至痢者大腸内事也大腸既病失其傳送之職故正糞不行純乎下痢膿血而已所以向來穀食停積在胃直須大腸邪氣將退胃氣通行正糞自此而下今大腸失職正糞尚自不行又何能為胃載毒而出毒既不前羈留在胃最能敗壞真氣在胃一日有一日之害一時有一時之害耗氣搏血神脫氣盡而死凡遇疫痢兼證者在痢尤為喫𦂳疫痢俱急者宜檳芍順氣湯誠為一舉兩得㯽芍順氣湯專治下痢頻數裏急後重兼舌胎黄得疫之裏證者檳榔芍藥枳實厚朴大黄生薑煎服小兒太極丸在小兒時疫條後天竺黄五錢膽星五錢大黄二錢麝香三分氷片三分殭蠶三錢其為細末端午日午時脩合糯米飯杵為丸如芡實大硃砂為衣凡遇疫證姜湯化下一丸神効正名傷寒論曰發熱而渴不惡寒者為温病後人省氵加疒為瘟即温也如病證之證後人省文作証嗣後省言加疒為症又如滯下古人為下利膿血葢以瀉為下利後人加疒為痢要之古無瘟痢症三字盖後人之自為變易耳不可因易其文以温瘟為兩病各指受病之原乃指冬之伏寒至春至夏發為温熱又以非時之氣為瘟疫果爾又當異證異脉不然臨治之際何以知受病之不同也設使脉病不同病原各異又當另立方論治法然則脉證治法又何立哉枝節愈繁而正意愈亂學者未免有多岐之惑夫温者熱之始熱者温之終温熱首尾一體故又為熱病即温病也又名疫者以其延門合户如徭役之役衆人均等之謂也今省文作殳加疒為疫又為時疫時氣者因其感時行戾氣所發也因其惡厲又謂之疫厲終於得汗而解故燕冀名為汗病此外又有風温濕温即温病夾外感之兼證名各不同究其病則一然近世稱疫者衆書以温疫名者弗遺其言也後以傷寒例及諸家所議凡有關于温疫其中多有誤者恐致惑于來學悉采以正焉傷寒例正誤陰陽大論云春氣温和夏氣暑熱秋氣清涼冬氣冷洌此則四時正氣之序也冬時嚴寒萬類深藏君子固宻則不傷于寒觸冒之者乃名傷寒耳其傷于四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏于肌膚至春變為温病至夏變為暑病暑病者熱極重於温也成註内經曰先夏至為温病後夏至為暑病温暑之病本於傷寒而得之按十二經絡與夫奇經八脉無非榮衛氣血周布一身而榮養百骸是以天真元氣無往不在不在則麻木不仁造化之機無刻不運不運則顛倒仆絶然風寒暑濕之邪與吾身之榮衛勢不兩立一有所中疾苦作矣苟或不除不危即斃上文所言冬時嚴寒所傷中而即病者為傷寒不即病者至春變為温病至夏變為暑病然風寒所傷輕則感冒重則傷寒即感冒一證風寒所傷之最輕者尚爾頭疼身痛四肢拘急鼻塞聲重痰𠻳喘急惡寒發熱當即為病不能容隱今冬時嚴寒所傷非細事也反能藏伏過時而發耶更問何等中而即病何等中而不即病何等中而即病者頭痛如破身痛如杖惡寒項強發熱如炙或喘或嘔甚則發痙六脉疾數躁煩不寧至後傳變不可勝言倉辛失治乃致傷生何等中不即病者感則一毫不覺既而延至春夏當其已中之後未發之前飲食起居如常神色聲氣纎毫不異其已發之證勢不減于傷寒况風寒所傷未有不由肌表而入所傷皆榮衛所感均係風寒一者何其懞懵藏而不知一者何其靈異感而即發同源而異流天壤之隔豈無説耶既無其説則知温熱之原非傷寒所中矣且言寒毒藏於肌膚之間肌為肌表膚為皮之淺者其間一毫一竅無非榮衛經行所攝之地即感冒些小風寒尚不能稽留當即為病何况受嚴寒殺厲之氣且感於皮膚最淺之處反能容隠者耶以此推之必無是事矣凡治客邪大法要在表裏分明所謂未入于府者邪在經也可汗而已既入于府者邪在裏也可下而已果係寒毒藏于肌膚雖過時而發邪氣猶然在表治法不無發散邪從汗解後世治温熱病者若執肌膚在表之邪一投發散是非徒無益而又害之矣凡病先有病因方有病證假令傷寒中暑各以病邪而立名若言熱證尚可糢糊若以暑病為名乃是香薷飲之證彼此其可相混凡客病感邪之重者則病甚其熱亦甚感邪之輕者則病輕其熱亦微熱之微甚存乎感邪之輕重也二三月及八九月其時亦有病重大熱不止失治而死者五六月亦有病輕熱微不藥而愈者凡温病四時皆有但仲夏感者多春秋次之冬時又次之但可以時令分病之多寡不可以時令分熱之輕重也是以辛苦之人春夏多温熱證者皆因冬時觸寒所致非時行之氣也凡時行者春時應煖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大温此非其時有其氣是以一嵗之中長幼之病多相似者此作時行之氣也然氣候亦有應至而不至或有至而太過者或未應至而至者皆成病氣也春温夏熱秋涼冬寒乃四時之常因風雨陰睛稍為損益假令春應暖而反多寒其時必多雨秋應涼而熱不去者此際必多晴夫陰晴旱潦之不測寒暑損益安可以為拘此天地四時之常事未必為疫夫疫者感天地之戾氣也戾氣者非寒非暑非煖非涼亦非四時交錯之氣乃天地别有一種戾氣多見于兵荒之嵗間嵗亦有之但不甚耳上文所言長幼之病多相似者此則為時行之氣雖不言疫疫之意寓是矣殊不知四時之氣雖損益于其間及其所感之病終不離其本原假令正二月應煖偶因風雨交集天氣不能温熱而多春寒所感之病輕則為感冒重則為傷寒原從感冒傷寒法治之但春寒之氣終不若冬時嚴寒殺厲之氣為重投劑不無有輕重之分此即應至而不至至而不去二事也又如八九月適多風雨偶有暴寒之氣先至所感之病大約與春寒彷彿深秋之寒終不若冬時殺厲之氣為重此即未應至而至即冬時嚴寒倍常是爲至而太過所感亦不過即病之傷寒耳假令夏時多風雨炎威少息為至而不及時多亢旱爍石流金為至而太過太過則病甚不及則病微至於傷暑一也其病與四時正氣之序何異耶治法無出于香薷飲而已其冬時有非節之煖名曰冬温此即未應至而至也按冬傷於寒至春變為温病今又以冬時非節之煖為冬温一感于冬寒一感于冬温一病兩名寒温懸絶然則脉證治法又何似耶夫四氣乃二氣之離合也二氣即一氣之升降也升極則降降極則升升降之極為陰陽離離則氣亢氣亢則致病亢氣者冬之大寒夏之大暑也將升不升將降不降為隂陽合合則氣和氣和則不致病和氣者即春之温暖秋之清涼也是以陰極而陽氣來和為温暖陽極而隂氣來和為清涼斯有既濟之道焉若夫春寒秋熱為冬夏之偏氣倘有觸冐之者因以為疾若夏涼冬煖轉得春秋之和氣豈有因其和而反致疾者所以但見傷寒中暑未嘗見傷温和而中清涼也温煖清涼未必為病又烏可以言疫從春分以後至秋分節天有暴寒者此皆時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五六月陽氣已盛為寒所折病熱為重七八月陽氣已衰為寒所折病熱亦微其病與温及暑病相似但有殊耳按四時皆有暴寒但冬時感嚴寒殺厲之氣名傷寒為病最重其餘三時寒微為病亦微又以三時較之盛夏偶有些小風寒所感之病更微矣此則以感寒之重病亦重而熱亦重感寒之輕病亦輕而熱亦輕是重于冬而畧于三時至夏而又畧之此必然之理也上文所言三四月陽氣尚弱為寒所折病熱猶輕五六月以其時陽氣已盛為寒所折病熱為重七八月其時陽氣已衰為寒所折病熱亦微由是言之在冬時陽氣潛藏為寒所折病熱更微此則反是夏時感寒為重冬時感寒為輕前後矛盾于理大違又春夏秋三時偶有暴寒所着與冬時感冒相同治法無二但可名感冒不當另立寒疫之名若又以疫為名殊類畫蛇添足諸家温疫正誤雲岐子傷寒汗下不愈過經其病尚在而不除者亦為瘟疫病也如太陽證汗下過經不愈診得尺寸俱浮者太陽温疫也如身熱目痛不眠汗下過經不愈診得尺寸俱長者陽明温病也如胸脇脹滿汗下過經不愈診得尺寸俱弦者少陽温病也如腹滿咽乾診得尺寸俱沉細過經不愈者太陰温病也如口燥舌乾而渴診得尺寸俱沉細過經不愈者少隂温病也如煩滿囊縮診得尺寸俱微緩過經不愈者厥陰温病也是故隨其經而取之隨其經而治之如發斑乃温毒也按傷寒叙一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰為傳經盡七日後傳太陽為過經雲岐子所言傷寒過經不愈者便指為温病竟不知傷寒温病自是兩途未有始傷寒而過經變為温病者若果温病自内達外何有𫝊經若能傳經即是傷寒而非温病明矣汪云愚謂温與熱有輕重之分故仲景云若遇温氣則為温病此叔和之言非仲景本論更遇温熱氣即為温毒熱比温尤重故也但冬傷於寒至春而發不感異氣名曰温病此病之稍輕者也温病未已更遇温氣變為温病此病之稍重者也傷寒例以再遇温氣名曰温疫又有不因冬傷於寒至春而病温者此特感春温之氣可名春温如冬之傷寒秋之傷濕夏之中暑相同也按隂陽大論四時正氣之序春温夏暑秋涼冬寒今特感春温之氣可名春温若感秋涼之氣可名秋涼病矣春温可以為温病秋涼獨不可為涼病乎以涼病似覺難言勉以濕証搪塞既知秋涼病有碍反而思之則知春温病殊為謬妄矣以此觀之是春之温病有三種不同有冬傷於寒至春變為温病者有温病未已再遇温氣而為温病者有重感温氣相雜而為温病者有不因冬傷于寒不因更遇温氣只於春時感春温之氣而病者若此三者皆可名爲温病不必各立名色只要知其病原之不同也凡病各有病因如傷寒自覺觸冒風寒如傷食自覺飲食過度各有所責至於温病乃伏邪所發多有安居靜養别無他故倐焉而病詢其所以然之故無處尋思况求感受之際且自不覺故立論者或言各時非節之暖或言春之温氣或言傷寒過經不解或言冬時伏寒至春夏乃發按冬傷于寒春必病温出自素問此漢人所撰晉時王叔和又以述傷寒例葢順文之誤或指冬不藏精春必温病此亦漢人所撰但言斵䘮致病不言因邪治病又見冬時之温病與春夏之温疫脉證相同治法無異據云冬時即病為傷寒今温病亦發于冬時思之至此不能無疑乃覺前人所論難慿務求其所以然之故既不可言傷寒又不可言伏寒因以冬時非節之暖牽合而為病原不思嚴寒酷暑因其鋒利人所易犯故為病最重至于温暖乃天地中和之氣萬物得之而發育氣血得之而融和當其肅殺之令權施仁政未有因其仁政而反蒙其害者切當較之冬時未嘗温暖亦有温病或遇隆冬暫時温煖雖有温病或温之由亦無確據既不過猜疑之説烏足以為定論或言感三春當令之温氣為温病夫春時自應温暖責之尤其無謂或言温病後或温氣而為温病正如頭上安頭或言傷寒汗下過經不愈者為温病則又指鹿為馬活人又以夏應暑而寒氣折之責邪在心為夏温秋應涼而大熱折之責邪在肺為秋温轉屬支離陶氏又以秋感温氣而為秋温明是雜證敘温者絡繹議論者各别言愈繁雜而本源愈失使學者反増亡羊之惑與醫道何補活人書云夏月發熱惡寒頭疼身體肢節痛重其脉洪盛者熱也冬傷于寒因暑氣而發為熱病治熱病與傷寒同有汗宜桂枝湯無汗宜麻黄湯如煩躁宜大青龍湯然夏月藥性須帶涼不可太温桂枝麻黄大青龍須用加減夏至前桂枝加黄芩夏至後桂枝麻黄大青龍加知母石膏或加升麻葢桂枝麻黄性熱地暖處非西北之比夏月服之必有發黄出斑之失熱病三日外于前湯不瘥脉勢仍數邪氣猶在經絡未入藏府者桂枝石膏湯主之此方夏至後可代桂枝證若加麻黄可代麻黄青龍湯證也若三月至夏為晩發傷寒梔子升麻湯亦暫用之王宇泰述萬暦癸夘李氏一壻應舉南下方盛暑傷寒一太學生新讀仲景書自謂知醫投以桂枝湯入腹即斃大抵麻黄桂枝二湯隆冬正傷寒之藥施之于温病不可何況于熱病乎按活人書以温熱病用桂枝麻黄雖加涼藥終未免發散之誤不危幸矣豈止三日外與前湯不瘥脉勢仍數而已哉至此尚然不悞為半裏之證且言邪氣猶在經絡仍用桂枝石膏湯至死無悔王宇泰非之甚當是以不用麻黄桂枝賢於活人書逺矣究竟不識温熱之源是以不知用藥耳春温活人書曰春應温而清氣折之責邪在肝或身熱頭疼目眩嘔吐長幼率相似升麻葛根湯解肌湯四時通用敗毒散陶氏曰交春後至夏至前不惡寒而渴者為温病用辛涼之藥微解肌不可大發汗急證現者用寒涼之藥急攻之不可誤汗誤下當須識此表證不與正傷寒同法裏證治法同夏温活人書曰夏應暑而寒氣折之責邪在心或身熱頭疼腹滿自利長幼率相似理中湯射干湯半夏桂枝湯陶氏曰交夏至有頭疼發熱不惡寒而渴此名温病愈加熱者為熱病止用辛涼之藥解肌不宜大汗裏證見者急攻下表證不與正傷寒同法裏證治法同秋温活人書曰秋應涼而大熱折之責邪在肺濕熱相摶民病咳𠻳金沸草散白虎加蒼术湯病癉發黄茵陳五苓散陶氏曰交秋至霜降前有頭疼發熱不惡寒身體痛小便短者名濕病亦用辛涼之藥加疏利以解肌亦不宜汗裏證見者宜攻下表證不與正傷寒同法冬温活人書云冬應寒而反大温折之責邪在腎宜萎蕤湯丹溪曰冬温為病非其時有其氣者冬時嚴寒君子當閉藏而反發泄於外專用補藥帶表藥按西北髙厚之地風髙氣燥温證希有南方卑濕之地更遇久雨淋漓時有感濕者天地或時久雨或時亢旱葢非時令所拘故傷濕之證隨時有之不待交秋而後能也推節菴之意以至春為温病至夏為熱病至秋似不可復言温熱然至秋冬又未免温病只得勉以濕證抵搪且濕為雜證更不可借此混淆惟其不知温病四時皆有故説到冬時遂付之不言王宇泰氏因見陶氏不言乃引丹溪述非其時有其氣以補冬温之缺然則冬時交錯之氣又不可以為冬温也俗人但言四時之温葢不知温之源故春責清氣夏責寒氣秋責熱氣冬責温氣殊不知清温寒熱總非温病之源復以四時專令之藏而受傷不但膠柱鼓瑟且又罪及無辜矣瘟疫論補遺
